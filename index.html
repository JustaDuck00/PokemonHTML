<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Game</title>


    <style>
        * {font-family: 'Press Start 2P', cursive;}
        h1{margin:0;}
        button{border:none; cursor:pointer;font-size:16px;}
        button:hover{background-color:#ddd;}
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
        }

        #overlapping {
            display: inline-block;
            position: relative;
        }

        #introVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 1024px;
            height: 576px;
            object-fit: cover;
            background: black;
            z-index: 20;
        }

        #flashOverlay {
            background-color: black;
            position: absolute;
            top: 0;
            left: 0;
            width: 1024px;
            height: 576px;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 1024px;
            height: 576px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-size: 28px;
            z-index: 30;
            cursor: pointer;
        }

        canvas {
            display: block;
        }

        #attackBox {
            background-color: white;
            width: 1024px;
            height: 150px;
            position: fixed;
            bottom: 334px;
            left: 0;
            z-index: 9999;
            border-top: 4px black solid;
            display: none;
        }
        #healthoppBox {
            background-color: white;
            width: 300px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            border: 4px black solid;
            flex-direction: column;
            padding: 12px;
            display:none;
        }
        #healthownBox {
            background-color: white;
            width: 300px;
            position: fixed;
            bottom: 485px;
            left: 695px;
            z-index: 9999;
            border: 4px black solid;
            flex-direction: column;
            padding:12px;
            display:none;
        }
    </style>
</head>

<body>

<div id="overlapping">

    <div id="startScreen">Click To Start</div>

    <video id="introVideo">
        <source src="./vid/intro.mp4" type="video/mp4">
    </video>

    <div id="flashOverlay"></div>

    <canvas width="1024" height="576"></canvas>

</div>

<div id="attackBox">
    <div style="width: 66.66%;display:grid; grid-template-columns:repeat(2,1fr)">
        <button >tackle</button>
        <button >quick attack</button>
        <button >empty</button>
        <button >empty 4</button>
    </div>
    <div style="width:33.33%; display:  flex; align-items:center; justify-content: center; border-left: 4px black solid;"><h1 style="font-size:16px;">
        Attack type
    </h1>
    </div>
</div>
<div id="healthownBox">
    <h1 style="font-size:16px">bulbasaur</h1>
    <div style="position:relative;width:100%;margin-top:12px;">
        <div style=" height:5px; background-color:#ccc; margin-top:10px; position:absolute;"></div>
        <div style="height:5px;background-color: greenyellow;position:absolute;left:0;right:0;"></div>
    </div>
    <div style="position:relative;width:100%;margin-top:12px;">
        <div style=" height:5px; background-color:#ccc; margin-top:10px; position:absolute;"></div>
        <div style="height:5px;background-color: deepskyblue;position:absolute;left:0;right:0;"></div>
    </div>
</div>
<div id="healthoppBox">
    <h1 style="font-size:16px">bulbasaur</h1>
    <div style="position:relative;width:100%;margin-top:12px;">
        <div style=" height:5px; background-color:#ccc; margin-top:10px; position:absolute;"></div>
        <div style="height:5px;background-color: greenyellow;position:absolute;left:0;right:0;"></div>
    </div>
</div>

<script>
    const video = document.getElementById('introVideo')
    const startScreen = document.getElementById('startScreen')

    startScreen.addEventListener('click', () => {
        startScreen.style.display = 'none'
        video.play()
    })

    video.addEventListener('ended', () => {
        video.style.display = 'none'
    })

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && video.style.display !== 'none') {
            video.pause()
            video.style.display = 'none'
        }
    })
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
<script src="battlezones.js"></script>
<script src="collisions.js"></script>
<script src="index.js"></script>

</body>
</html>
